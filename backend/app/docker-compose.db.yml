

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: hcp_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hcp_user
      POSTGRES_PASSWORD: hcp_pass
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"        # exposed to localhost so FastAPI can reach it
    volumes:
      - hcp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcp_user -d hcp_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hcp_pgdata:
    driver: local